name = "x1-proxy"
main = "src/worker.js"
compatibility_date = "2026-06-01"
account_id = "130e823c470feb5c46d25d59a5f9bcd3"

# ═══════════════════════════════════════════
# Worker config — X1 AI Gateway (v4)
# ═══════════════════════════════════════════

# === Secrets (set via `npx wrangler secret put NAME`) ===
# Each provider in src/providers.config.js maps to one envKey here.
#
#   npx wrangler secret put GROQ_KEY
#   npx wrangler secret put GROK_KEY
#   npx wrangler secret put OPENAI_KEY
#   npx wrangler secret put GEMINI_KEY
#   npx wrangler secret put MISTRAL_KEY
#   npx wrangler secret put DEEPSEEK_KEY
#   npx wrangler secret put TOGETHER_KEY
#   npx wrangler secret put OPENROUTER_KEY
#   npx wrangler secret put CEREBRAS_KEY
#   npx wrangler secret put SAMBANOVA_KEY
#   npx wrangler secret put NVIDIA_KEY
#   npx wrangler secret put CF_AI_KEY
#   npx wrangler secret put OPENCODE_KEY
#   npx wrangler secret put ANTHROPIC_KEY      # disabled in v4, ready for Phase 6
#   npx wrangler secret put TAVILY_KEY         # web search (Phase 6)
#
#   npx wrangler secret put PROXY_SHARED_SECRET
#     Required. Gates /v1/chat/completions and /debug — without it the worker
#     fails closed (503) rather than staying open to anyone who finds the URL.
#     The extension must send the identical value in the X-X1-Auth header
#     (set it once in X1 Settings → "Proxy secret" — same value, never in code).

# === Vars (non-secret, set inline) ===
[vars]
# Account ID for Cloudflare Workers AI (separate from `account_id` above).
# Get it: https://dash.cloudflare.com → Workers & Pages → Overview → Account ID
CF_ACCOUNT_ID = ""

# Per-provider timeout. Total budget = PER_PROVIDER_MS * (chain length / parallelism).
# 8s era insuficiente para informes largos (analisis de repo, revision de PR)
# que piden miles de tokens de salida — el modelo ni llega a generar en 8s.
PER_PROVIDER_MS = "20000"

# Total request budget across all providers in a cascade.
TOTAL_BUDGET_MS = "55000"

# Circuit breaker: open the circuit after N consecutive failures per provider.
BREAKER_FAILS = "3"

# Circuit breaker: cooldown before re-trying a tripped provider (ms).
BREAKER_COOLDOWN_MS = "60000"

# Max requests per IP per minute — only enforced once X1_KV is bound below.
RATE_LIMIT_PER_MIN = "30"

# === KV namespaces (per-IP rate limiting + cross-worker breaker state) ===
# Optional but recommended now that /v1/chat/completions is auth-gated: the
# shared secret stops randoms, but if it ever leaks, this caps the damage.
# Also REQUIRED for the external command queue below (POST /commands/queue,
# GET /commands/poll) — without it, /commands/queue responds 501 rather than
# silently dropping commands or pretending to queue reliably.
# To create: npx wrangler kv:namespace create X1_KV
# Then paste the id below:
# [[kv_namespaces]]
# binding = "X1_KV"
# id = "<paste-here>"

# === External command reception (B.14) ===
# n8n/Zapier/etc POST to https://<worker-url>/commands/queue with header
# X-X1-Auth: <PROXY_SHARED_SECRET> and body {"command": "cotizacion de AAPL"}.
# X1 polls GET /commands/poll every ~1 minute (chrome.alarms, service-worker.js)
# and auto-runs only read-only actions (SAFE_EXTERNAL_ACTIONS) — anything else
# (send email, delete, purchase-shaped) is queued for manual approval instead.