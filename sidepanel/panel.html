<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <div class="header-start">
        <div class="agent-picker" id="agent-picker">
          <span class="agent-picker-label" id="picker-label">Research</span>
          <svg width="10" height="10" fill="currentColor" viewBox="0 0 12 12"><path d="M6 8.825c-.2 0-.4-.1-.5-.2l-3.3-3.3c-.3-.3-.3-.8 0-1.1.3-.3.8-.3 1.1 0l2.7 2.7 2.7-2.7c.3-.3.8-.3 1.1 0 .3.3.3.8 0 1.1l-3.2 3.2c-.2.2-.4.3-.6.3Z"/></svg>
        </div>
        <div id="dropdown" class="dropdown hidden"></div>
      </div>
      <div class="header-end">
        <span class="status"><span class="status-dot"></span>Online</span>
        <button id="btn-gh" class="header-btn" title="Repository">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </button>
      </div>
    </header>

    <div id="repo-bar">
      <svg width="11" height="11" fill="currentColor" viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 010-1.5h1.75v-2h-8a1 1 0 00-.71 1.7.75.75 0 01-.53 1.28h-.25A2.5 2.5 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/></svg>
      <span id="repo-text">iarjona2000/research-lib</span>
      <a id="repo-link" href="#" target="_blank">Open</a>
    </div>

    <main id="content">
      <section id="view-chat" class="view active">
        <div id="messages" role="log" aria-label="Messages"></div>
        <div id="composer">
          <div class="input-group">
            <textarea id="input" rows="1" placeholder="Ask me anything..." autofocus></textarea>
            <div class="input-actions">
              <button id="btn-mic" class="btn-icon" title="Voice input" aria-label="Voice input">
                <svg width="15" height="15" fill="currentColor" viewBox="0 0 16 16"><path d="M8 1a3 3 0 00-3 3v3.5a3 3 0 006 0V4a3 3 0 00-3-3zM4 7.5V8a4 4 0 108 0V7.5a.75.75 0 011.5 0V8a5.5 5.5 0 01-11 0V7.5A.75.75 0 014 7.5zM8 14a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 018 14z"/></svg>
              </button>
              <button id="btn-send" class="btn-icon btn-send" title="Send" aria-label="Send" disabled>
                <svg width="15" height="15" fill="currentColor" viewBox="0 0 16 16"><path d="M1 8a.75.75 0 01.75-.75h11.69l-5.22-5.22a.75.75 0 011.06-1.06l6.5 6.5a.75.75 0 010 1.06l-6.5 6.5a.75.75 0 01-1.06-1.06l5.22-5.22H1.75A.75.75 0 011 8z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

  </div>
  <script src="panel.js"></script>
</body>
</html>
