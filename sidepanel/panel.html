<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <button type="button" id="btn-menu" class="header-icon-btn" aria-label="Abrir menú">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div id="header-center">
        <img id="logo" src="../assets/x1-logo-blue.png" alt="X1">
        <span id="header-title" class="truncate">Nueva conversación</span>
      </div>
      <button type="button" id="btn-new" class="header-icon-btn" aria-label="Nueva conversación">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </header>

    <main id="content">
      <section id="tab-chat" class="tab-view active">
        <div id="messages"></div>
      </section>
    </main>

    <footer id="input-area">
      <div id="input-container">
        <textarea id="input" rows="1" placeholder="Escribe un mensaje a X1..."></textarea>
        <div id="input-actions">
          <div id="input-toggles">
            <button type="button" class="toggle-chip" data-toggle="think" aria-pressed="false">
              <svg class="chip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 18h6M10 22h4M12 2v4M7 12a5 5 0 0110 0c0 2-2 3-2 5h-6c0-2-2-3-2-5z"/></svg>
              Pensar
            </button>
            <button type="button" class="toggle-chip" data-toggle="search" aria-pressed="false">
              <svg class="chip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              Buscar
            </button>
          </div>
          <div id="input-buttons">
            <button type="button" id="btn-mic" class="input-icon-btn" aria-label="Entrada de voz">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
            </button>
            <button type="button" id="btn-send" class="input-icon-btn primary" aria-label="Enviar mensaje" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
      <p id="input-footer">X1 puede cometer errores. Verifica la información importante.</p>
      <div id="provider-status">
        <span class="ps-item clickable" data-provider="fcc" title="Click para iniciar FCC proxy"><span class="ps-dot"></span>FCC</span>
        <span class="ps-item" data-provider="freeweb"><span class="ps-dot"></span>Web</span>
        <span class="ps-item" data-provider="webllm"><span class="ps-dot"></span>Local</span>
      </div>
    </footer>

  </div>
  <script src="panel.js"></script>
</body>
</html>
