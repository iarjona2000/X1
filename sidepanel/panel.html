<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System X1</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
    #root { height: 100%; }
    body { background: #ffffff; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <link rel="stylesheet" href="dist/panel-ui-2026.css">
  <script src="dist/panel-ui-2026.js"></script>
