<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="X1 - Advanced Machine Intelligence Side Panel v2" />
  <meta name="theme-color" content="#6366f1" />
  <title>X1 Side Panel v2</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9B1z2hJo03QDfOZ+gPZJnNOJmLlq1J6XGmJ5bQ0dZz1+GkFVBfQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <link rel="stylesheet" href="./sidepanel-v2.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-content">
      <div class="x1-logo">
        <span class="logo-text">X1</span>
        <div class="logo-glow"></div>
      </div>
      <div class="loading-progress">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>
      <p class="loading-text">Initializing X1 Intelligence...</p>
    </div>
  </div>

  <!-- App Container -->
  <div id="appContainer" class="app-container hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-wrapper">
          <span class="logo-text">X1</span>
          <div class="status-indicator online"></div>
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" id="settingsBtn" title="Settings">
          <i class="fas fa-cog"></i>
        </button>
        <button class="header-btn" id="refreshBtn" title="Refresh">
          <i class="fas fa-refresh"></i>
        </button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-navigation">
      <button class="tab-btn active" data-tab="chat">
        <i class="fas fa-message"></i>
        <span>Chat</span>
      </button>
      <button class="tab-btn" data-tab="calendar">
        <i class="fas fa-calendar"></i>
        <span>Calendar</span>
      </button>
      <button class="tab-btn" data-tab="email">
        <i class="fas fa-envelope"></i>
        <span>Email</span>
      </button>
      <button class="tab-btn" data-tab="tasks">
        <i class="fas fa-tasks"></i>
        <span>Tasks</span>
      </button>
      <button class="tab-btn" data-tab="settings">
        <i class="fas fa-gear"></i>
        <span>Settings</span>
      </button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Chat Tab -->
      <section id="chatTab" class="tab-content active">
        <div class="chat-container">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-container">
            <textarea id="chatInput" class="chat-input" placeholder="Ask X1 anything..." rows="1"></textarea>
            <button id="sendBtn" class="send-button" disabled>
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </section>

      <!-- Calendar Tab -->
      <section id="calendarTab" class="tab-content">
        <div class="calendar-container">
          <div class="calendar-header">
            <h2>Upcoming Events</h2>
            <button class="quick-action-btn" id="addEventBtn">
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <div class="events-list" id="eventsList">
            <div class="empty-state">
              <i class="fas fa-calendar-day"></i>
              <p>No upcoming events</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Email Tab -->
      <section id="emailTab" class="tab-content">
        <div class="email-container">
          <div class="email-header">
            <h2>Recent Emails</h2>
            <button class="quick-action-btn" id="composeBtn">
              <i class="fas fa-edit"></i>
            </button>
          </div>
          <div class="emails-list" id="emailsList">
            <div class="empty-state">
              <i class="fas fa-envelope-open"></i>
              <p>No recent emails</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Tasks Tab -->
      <section id="tasksTab" class="tab-content">
        <div class="tasks-container">
          <div class="tasks-header">
            <h2>Tasks</h2>
            <button class="quick-action-btn" id="addTaskBtn">
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <div class="tasks-list" id="tasksList">
            <div class="empty-state">
              <i class="fas fa-clipboard-list"></i>
              <p>No tasks yet</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Settings Tab -->
      <section id="settingsTab" class="tab-content">
        <div class="settings-container">
          <h2>Settings</h2>
          <div class="settings-list">
            <div class="setting-item">
              <div class="setting-info">
                <h3>Dark Mode</h3>
                <p>Toggle dark/light theme</p>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="darkModeToggle" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="setting-item">
              <div class="setting-info">
                <h3>Notifications</h3>
                <p>Enable desktop notifications</p>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="notificationsToggle" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="setting-item">
              <div class="setting-info">
                <h3>Auto Refresh</h3>
                <p>Refresh data every 5 minutes</p>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="autoRefreshToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Floating Action Button -->
    <button id="fab" class="fab" title="Quick Actions">
      <i class="fas fa-bolt"></i>
    </button>

    <!-- Quick Actions Panel -->
    <div id="quickActionsPanel" class="quick-actions-panel hidden">
      <div class="quick-actions-content">
        <button class="quick-action" data-action="summarize">
          <i class="fas fa-file-lines"></i>
          <span>Summarize Page</span>
        </button>
        <button class="quick-action" data-action="read-aloud">
          <i class="fas fa-volume-high"></i>
          <span>Read Aloud</span>
        </button>
        <button class="quick-action" data-action="screenshot">
          <i class="fas fa-camera"></i>
          <span>Screenshot</span>
        </button>
        <button class="quick-action" data-action="ask-ai">
          <i class="fas fa-robot"></i>
          <span>Ask AI</span>
        </button>
      </div>
    </div>
  </div>

  <script src="./sidepanel-v2.js"></script>
</body>
</html>
