<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X1 Robot - Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, system-ui, sans-serif;
      color: #e0e0e0;
      padding: 40px 20px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #7c6aff; }
    .controls { display: flex; gap: 12px; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: rgba(124, 106, 255, 0.2);
      color: #e0e0e0;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(124, 106, 255, 0.3);
    }
    button:hover { background: rgba(124, 106, 255, 0.4); transform: translateY(-2px); }
    button.active { background: #7c6aff; border-color: #7c6aff; color: white; }
    .robot-container { 
      position: relative; 
      width: 200px; 
      height: 280px; 
      margin: 2rem auto;
      filter: drop-shadow(0 20px 60px rgba(124, 106, 255, 0.3));
    }
    .state-label { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #888; }
    .description { max-width: 600px; text-align: center; margin: 2rem auto; line-height: 1.6; color: #aaa; }
  </style>
</head>
<body>
  <h1>X1 Robot - Estados</h1>
  
  <div class="controls">
    <button id="btn-idle" onclick="setState('idle')">😴 Idle</button>
    <button id="btn-listening" onclick="setState('listening')">🎤 Listening</button>
    <button id="btn-thinking" onclick="setState('thinking')">🤔 Thinking</button>
    <button id="btn-speaking" onclick="setState('speaking')">💬 Speaking</button>
  </div>

  <div class="robot-container">
    <svg id="robot" viewBox="0 0 200 280" width="200" height="280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style><![CDATA[
          /* ===== KEYFRAMES ===== */
          @keyframes blink { 0%,90%,100% {opacity:1} 95% {opacity:0} }
          @keyframes wave { 0%,100% {stroke-dashoffset:0} 50% {stroke-dashoffset:20} }
          @keyframes pulse { 0%,100% {opacity:0.6} 50% {opacity:1} }
          @keyframes spin { to {transform:rotate(360deg)} }
          @keyframes armThink { 0%,100% {transform:rotate(0)} 50% {transform:rotate(10deg)} }
          @keyframes talk { 0%,100% {height:4px} 50% {height:14px} }
          @keyframes float { 0%,100% {transform:translateY(0)} 50% {transform:translateY(-3px)} }
          @keyframes glowPulse { 0%,100% {opacity:0.3} 50% {opacity:0.6} }
          
          /* ===== BASE STYLES ===== */
          .robot-part { transition: transform 0.3s ease; }
          
          /* ===== IDLE ===== */
          #robot.idle #pupil-l, #robot.idle #pupil-r { animation: blink 4s infinite; }
          #robot.idle .robot-part { animation: float 3s infinite ease-in-out; }
          
          /* ===== LISTENING ===== */
          #robot.listening #eyes { filter: drop-shadow(0 0 10px #7c6aff); }
          #robot.listening #chest-wave line { 
            animation: wave 0.5s infinite; 
            stroke-dasharray: 20;
            stroke-dashoffset: 0;
          }
          #robot.listening #antenna-circle { 
            animation: pulse 0.6s infinite; 
            transform-origin: 100px 0;
          }
          #robot.listening .robot-part { animation: float 1s infinite ease-in-out; }
          
          /* ===== THINKING ===== */
          #robot.thinking #pupil-l, #robot.thinking #pupil-r { 
            animation: spin 1.5s infinite linear; 
            transform-origin: center;
          }
          #robot.thinking #antenna-group { 
            animation: spin 3s infinite linear; 
            transform-origin: 100px 20px;
          }
          #robot.thinking #arm-l { 
            animation: armThink 1.2s infinite ease-in-out; 
            transform-origin: 30px 120px;
          }
          #robot.thinking #arm-r { 
            animation: armThink 1.2s infinite ease-in-out reverse; 
            transform-origin: 170px 120px;
          }
          #robot.thinking .robot-part { animation: none; }
          
          /* ===== SPEAKING ===== */
          #robot.speaking #mouth { animation: talk 0.12s infinite; }
          #robot.speaking #eyes { filter: drop-shadow(0 0 8px #7c6aff); }
          
          /* ===== KEYFRAME DEFINITIONS ===== */
          @keyframes blink { 0%,90%,100% {opacity:1} 95% {opacity:0} }
          @keyframes wave { 0%,100% {stroke-dashoffset:0} 50% {stroke-dashoffset:20} }
          @keyframes pulse { 0%,100% {opacity:0.6} 50% {opacity:1} }
          @keyframes spin { to {transform:rotate(360deg)} }
          @keyframes armThink { 0%,100% {transform:rotate(0)} 50% {transform:rotate(12deg)} }
          @keyframes talk { 0%,100% {height:4px} 50% {height:16px} }
          @keyframes float { 0%,100% {transform:translateY(0)} 50% {transform:translateY(-4px)} }
          
          /* BASE COLORS */
          .bg { fill: #0d0d1a; }
          .metal { fill: #1a1a2e; stroke: #7c6aff; stroke-width: 2; }
          .metal-light { fill: #16162a; stroke: #7c6aff; stroke-width: 1.5; }
          .accent { fill: #7c6aff; }
          .accent-stroke { stroke: #7c6aff; stroke-width: 2; stroke-linecap: round; }
          .eye-white { fill: #0a0a1a; stroke: #7c6aff; stroke-width: 1.5; }
          .pupil { fill: #7c6aff; }
          .glow { fill: #7c6aff; opacity: 0.8; }
          .text-x1 { fill: #7c6aff; font-size: 24px; font-weight: bold; font-family: monospace; text-anchor: middle; }
          
          /* WAVE DASHARRAY */
          .wave-line { stroke-dasharray: 20; }
        ]]></style>
      </defs>
      
      <!-- Fondo -->
      <rect class="bg" x="0" y="0" width="200" height="280"/>
      
      <!-- GLOW BASE -->
      <ellipse id="base-glow" cx="100" cy="260" rx="80" ry="20" fill="url(#glow-gradient)" opacity="0.3"/>
      <defs>
        <radialGradient id="glow-gradient" cx="50%" cy="100%" r="50%">
          <stop offset="0%" stop-color="#7c6aff" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#7c6aff" stop-opacity="0"/>
        </radialGradient>
      </defs>
      
      <!-- CUERPO / TORSO -->
      <g class="robot-part" id="torso">
        <rect class="metal" x="50" y="100" width="100" height="120" rx="20"/>
        <!-- Onda de voz en pecho -->
        <g id="chest-wave">
          <line class="wave-line accent-stroke" x1="80" y1="140" x2="80" y2="180" stroke-width="4" stroke-linecap="round"/>
          <line class="wave-line accent-stroke" x1="100" y1="140" x2="100" y2="180" stroke-width="4" stroke-linecap="round"/>
          <line class="wave-line accent-stroke" x1="120" y1="140" x2="120" y2="180" stroke-width="4" stroke-linecap="round"/>
        </g>
        <!-- Logo X1 -->
        <text class="text-x1" x="100" y="170">X1</text>
      </g>
      
      <!-- BRAZOS -->
      <g id="arm-l" class="robot-part" transform="translate(0,0)">
        <g transform="translate(20, 120)">
          <rect class="metal-light" x="0" y="0" width="20" height="90" rx="10"/>
          <circle class="metal-light" cx="10" cy="110" r="15"/>
        </g>
      </g>
      <g id="arm-r" class="robot-part" transform="translate(0,0)">
        <g transform="translate(160, 120)">
          <rect class="metal-light" x="0" y="0" width="20" height="90" rx="10"/>
          <circle class="metal-light" cx="10" cy="110" r="15"/>
        </g>
      </g>
      
      <!-- CABEZA -->
      <g id="head" class="robot-part">
        <rect class="metal" x="40" y="20" width="120" height="90" rx="25"/>
        
        <!-- ANTENA -->
        <g id="antenna-group" class="robot-part">
          <line class="accent-stroke" x1="100" y1="20" x2="100" y2="0" stroke-width="3"/>
          <circle id="antenna-circle" class="glow" cx="100" cy="0" r="6">
            <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
          </circle>
        </g>
        
        <!-- OJOS -->
        <g id="eyes">
          <!-- Ojo izquierdo -->
          <ellipse class="eye-white" id="eye-l" cx="75" cy="65" rx="18" ry="14"/>
          <circle class="pupil" id="pupil-l" cx="75" cy="65" r="8">
            <animate attributeName="cy" values="65;62;65" dur="4s" repeatCount="indefinite"/>
          </circle>
          <circle cx="70" cy="60" r="3" fill="white" opacity="0.8"/>
          
          <!-- Ojo derecho -->
          <ellipse class="eye-white" id="eye-r" cx="125" cy="65" rx="18" ry="14"/>
          <circle class="pupil" id="pupil-r" cx="125" cy="65" r="8">
            <animate attributeName="cy" values="65;62;65" dur="4s" repeatCount="indefinite" begin="0.1s"/>
          </circle>
          <circle cx="120" cy="60" r="3" fill="white" opacity="0.8"/>
        </g>
        
        <!-- BOCA (para speaking) -->
        <rect id="mouth" x="90" y="95" width="20" height="4" rx="2" class="accent" opacity="0"/>
      </g>
      
      <!-- ANTENA arriba de la cabeza -->
      <line class="accent-stroke" x1="100" y1="20" x2="100" y2="-10" stroke-width="3"/>
      <circle class="glow" cx="100" cy="-10" r="6" id="antenna-top">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>
  
  <div class="state-label" id="state-label">Estado: <span id="current-state">idle</span></div>
  
  <div class="description">
    <strong>Estados del robot X1:</strong><br>
    😴 <strong>Idle</strong> - Parpadeo suave, flotación sutil<br>
    🎤 <strong>Listening</strong> - Ojos brillan, ondas en pecho pulsan, antena pulsa<br>
    🤔 <strong>Thinking</strong> - Ojos giran, antena rota, brazos se mueven<br>
    💬 <strong>Speaking</strong> - Boca se abre/cierra, ojos brillan
  </div>

  <script>
    const robot = document.getElementById('robot');
    const stateLabel = document.getElementById('current-state');
    const buttons = {
      idle: document.getElementById('btn-idle'),
      listening: document.getElementById('btn-listening'),
      thinking: document.getElementById('btn-thinking'),
      speaking: document.getElementById('btn-speaking')
    };
    
    function setState(state) {
      robot.className = state;
      stateLabel.textContent = state;
      
      // Update button styles
      Object.keys(buttons).forEach(key => {
        buttons[key].classList.toggle('active', key === state);
      });
    }
    
    // Auto-cycle demo
    let autoDemo = false;
    const states = ['idle', 'listening', 'thinking', 'speaking'];
    let demoIndex = 0;
    
    function toggleAutoDemo() {
      autoDemo = !autoDemo;
      if (autoDemo) {
        cycleDemo();
      }
    }
    
    function cycleDemo() {
      if (!autoDemo) return;
      setState(states[demoIndex]);
      demoIndex = (demoIndex + 1) % states.length;
      setTimeout(cycleDemo, 3000);
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === '1') setState('idle');
      if (e.key === '2') setState('listening');
      if (e.key === '3') setState('thinking');
      if (e.key === '4') setState('speaking');
      if (e.key === ' ') { e.preventDefault(); toggleAutoDemo(); }
    });
    
    // Start with idle
    setState('idle');
    
    // Auto demo after 2 seconds
    setTimeout(() => {
      autoDemo = true;
      cycleDemo();
    }, 2000);
  </script>
</body>
</html>
