<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>X1 — Fox Mascot Animation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      background: radial-gradient(ellipse at center top, #f8f4ff 0%, #ffffff 65%);
      display: grid;
      place-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .stage {
      width: min(640px, 90vw);
      height: min(640px, 90vw);
      position: relative;
      display: grid;
      place-items: center;
    }

    /* Floating motion-blur trail (visible en "zoom") */
    .trail {
      position: absolute;
      width: 200px; height: 40px;
      background: linear-gradient(90deg, transparent, rgba(180,120,255,0.45), transparent);
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0;
      transform: translateX(-180px) rotate(8deg);
    }

    .fox {
      width: 420px;
      transform-origin: 50% 90%;
      animation: float 4.5s ease-in-out infinite;
    }

    /* ─── Estado base (idle) ─── */
    .fox.state-idle { animation-play-state: running; }

    /* ─── Estado wave ─── */
    .fox.state-wave .arm-front {
      transform-origin: 200px 240px;
      animation: wave 1.2s ease-in-out 3;
    }
    .fox.state-wave { animation: float 4.5s ease-in-out infinite; }

    /* ─── Estado jump ─── */
    .fox.state-jump {
      animation: jump 0.7s cubic-bezier(.2,.8,.2,1.1) 1;
    }
    .fox.state-jump .tail { animation: tail-sway 0.3s ease-in-out infinite; }

    /* ─── Estado zoom (vuela hacia adelante) ─── */
    .fox.state-zoom {
      animation: zoom-fly 1.6s ease-in 1;
    }
    .fox.state-zoom .trail { opacity: 1; animation: trail-fly 1.6s ease-in 1; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%      { transform: translateY(-14px) rotate(1.5deg); }
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0); }
      25%      { transform: rotate(-20deg); }
      75%      { transform: rotate(15deg); }
    }
    @keyframes jump {
      0%   { transform: translateY(0) scaleY(1); }
      35%  { transform: translateY(-80px) scaleY(1.08); }
      60%  { transform: translateY(20px) scaleY(0.92); }
      80%  { transform: translateY(-10px) scaleY(1.02); }
      100% { transform: translateY(0) scaleY(1); }
    }
    @keyframes zoom-fly {
      0%   { transform: translate(0,0) scale(1) rotate(-5deg); }
      100% { transform: translate(300px,-120px) scale(0.4) rotate(15deg); }
    }
    @keyframes trail-fly {
      0%   { opacity: 0; transform: translateX(-180px) rotate(8deg); }
      40%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(120px) rotate(8deg); }
    }

    /* ─── Animaciones internas del personaje ─── */
    /* Respiración del cuerpo */
    .body-group {
      transform-origin: 200px 320px;
      animation: breathe 3.6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1, 1); }
      50%      { transform: scale(1.015, 0.985); }
    }

    /* Cola: sway */
    .tail {
      transform-origin: 110px 350px;
      animation: tail-sway 2.4s ease-in-out infinite;
    }
    @keyframes tail-sway {
      0%, 100% { transform: rotate(-6deg); }
      50%      { transform: rotate(8deg); }
    }

    /* Goggles glow pulse */
    .goggles-glow {
      transform-origin: center;
      animation: glow-pulse 2.8s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.04); }
    }

    /* Parpadeo de ojos */
    .eyes {
      transform-origin: 145px 175px;
      animation: blink 5s infinite;
    }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      94%, 96%      { transform: scaleY(0.05); }
    }

    /* Guiño (cada ~7s) */
    .eye-r {
      transform-origin: 235px 175px;
      animation: wink 7s infinite;
    }
    @keyframes wink {
      0%, 84%, 100% { transform: scaleY(1); }
      86%, 89%      { transform: scaleY(0.05); }
    }

    /* Orejas: leve twitch cada 4-6s */
    .ears {
      transform-origin: center;
      animation: ears-twitch 5.5s infinite;
    }
    @keyframes ears-twitch {
      0%, 88%, 100% { transform: rotate(0); }
      90%, 93%      { transform: rotate(4deg); }
    }

    /* Brazo levantado en wave */
    .arm-front {
      transform: rotate(0);
    }

    /* ─── HUD ─── */
    .hud {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 6px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .hud button {
      padding: 8px 16px;
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #404040;
      cursor: pointer;
      border-radius: 999px;
      transition: background 0.15s, color 0.15s;
    }
    .hud button:hover { background: rgba(0,0,0,0.05); color: #0a0a0a; }
    .hud button.active { background: #0a0a0a; color: #fff; }

    .label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #a3a3a3;
    }
  </style>
</head>
<body>

<div class="label">X1 · Mascot</div>

<div class="stage">
  <div class="fox state-idle" id="fox">
    <div class="trail"></div>

    <svg class="fox-svg" viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Gradientes -->
        <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#7c5cd6"/>
        </linearGradient>
        <linearGradient id="fur-shadow" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#8b6ce0"/>
          <stop offset="100%" stop-color="#6342b8"/>
        </linearGradient>
        <linearGradient id="tail" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#f0abfc"/>
          <stop offset="55%" stop-color="#c084fc"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
        <linearGradient id="visor" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
        <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%"  stop-color="#c4b5fd" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="armor" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#5b21b6"/>
        </linearGradient>
        <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#8b6ce0"/>
          <stop offset="100%" stop-color="#5b21b6"/>
        </linearGradient>
      </defs>

      <!-- Sombra del piso -->
      <ellipse cx="200" cy="465" rx="120" ry="10" fill="#0a0a0a" opacity="0.12"/>

      <!-- ─── COLA ─── -->
      <g class="tail">
        <path d="M 105 350
                 C 30 320, 0 250, 30 170
                 C 50 100, 110 80, 130 130
                 C 140 180, 130 270, 105 350 Z"
              fill="url(#tail)" stroke="#5b21b6" stroke-width="2" stroke-opacity="0.3"/>
        <!-- punta highlight -->
        <path d="M 50 160 C 70 110, 110 110, 120 140" fill="none" stroke="#fce7f3" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
      </g>

      <!-- ─── PATAS TRASERAS ─── -->
      <ellipse cx="160" cy="430" rx="32" ry="20" fill="url(#fur-shadow)"/>
      <ellipse cx="240" cy="430" rx="32" ry="20" fill="url(#fur-shadow)"/>

      <!-- ─── CUERPO + ARMOR ─── -->
      <g class="body-group">
        <!-- cuerpo base -->
        <path d="M 130 220
                 Q 130 160 200 160
                 Q 270 160 270 220
                 L 270 380
                 Q 270 420 200 420
                 Q 130 420 130 380 Z"
              fill="url(#fur)" stroke="#5b21b6" stroke-width="2" stroke-opacity="0.4"/>

        <!-- armadura / chaqueta -->
        <path d="M 145 250
                 L 175 240
                 L 200 250
                 L 225 240
                 L 255 250
                 L 260 380
                 Q 260 415 200 415
                 Q 140 415 140 380 Z"
              fill="url(#armor)" stroke="#4c1d95" stroke-width="1.5"/>

        <!-- cremallera central -->
        <line x1="200" y1="248" x2="200" y2="410" stroke="#fce7f3" stroke-width="2" opacity="0.7"/>

        <!-- pecho blanco -->
        <ellipse cx="200" cy="320" rx="55" ry="65" fill="#f8f4ff" opacity="0.95"/>
      </g>

      <!-- ─── BRAZOS ─── -->
      <!-- brazo trasero (oculto detrás del cuerpo) -->
      <ellipse cx="125" cy="320" rx="22" ry="38" fill="url(#fur-shadow)" transform="rotate(-12 125 320)"/>

      <!-- brazo frontal — animable -->
      <g class="arm-front">
        <ellipse cx="285" cy="320" rx="22" ry="42" fill="url(#fur-shadow)" transform="rotate(18 285 320)"/>
        <!-- guante/paw -->
        <circle cx="300" cy="365" r="20" fill="url(#fur-shadow)"/>
        <circle cx="296" cy="362" r="14" fill="#5b21b6" opacity="0.7"/>
      </g>

      <!-- ─── CABEZA ─── -->
      <g class="ears">
        <!-- oreja izquierda -->
        <path d="M 110 130 L 80 50 L 130 110 Z" fill="url(#hood)" stroke="#4c1d95" stroke-width="2"/>
        <path d="M 113 125 L 95 70 L 128 110 Z" fill="#f0abfc" opacity="0.85"/>
        <!-- oreja derecha -->
        <path d="M 290 130 L 320 50 L 270 110 Z" fill="url(#hood)" stroke="#4c1d95" stroke-width="2"/>
        <path d="M 287 125 L 305 70 L 272 110 Z" fill="#f0abfc" opacity="0.85"/>
      </g>

      <!-- cabeza base -->
      <path d="M 130 130
               Q 130 100 200 100
               Q 270 100 270 130
               L 270 200
               Q 270 230 200 230
               Q 130 230 130 200 Z"
            fill="url(#fur)" stroke="#5b21b6" stroke-width="2" stroke-opacity="0.4"/>

      <!-- hocico / snout -->
      <path d="M 175 195
               Q 175 180 200 180
               Q 225 180 225 195
               L 225 220
               Q 225 230 200 230
               Q 175 230 175 220 Z"
            fill="#f8f4ff"/>
      <!-- nariz -->
      <ellipse cx="200" cy="190" rx="7" ry="5" fill="#0a0a0a"/>
      <!-- boca (smile) -->
      <path d="M 188 210 Q 200 220 212 210" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>

      <!-- ─── GOGGLES ─── -->
      <!-- Glow de fondo -->
      <ellipse class="goggles-glow" cx="200" cy="155" rx="105" ry="38" fill="url(#glow)" opacity="0.6"/>

      <!-- Visor principal -->
      <rect x="115" y="125" width="170" height="60" rx="28" fill="url(#visor)" stroke="#4c1d95" stroke-width="2.5"/>

      <!-- Highlight superior del visor -->
      <path d="M 130 135 Q 200 122 270 135" fill="none" stroke="#fce7f3" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

      <!-- ─── OJOS (dentro del visor) ─── -->
      <g class="eyes">
        <!-- ojo izquierdo -->
        <ellipse cx="145" cy="155" rx="12" ry="18" fill="#fce7f3"/>
        <ellipse cx="145" cy="158" rx="9" ry="14" fill="#ffffff"/>
        <ellipse cx="145" cy="158" rx="5" ry="8" fill="#c4b5fd"/>
      </g>
      <g class="eye-r">
        <!-- ojo derecho -->
        <ellipse cx="235" cy="155" rx="12" ry="18" fill="#fce7f3"/>
        <ellipse cx="235" cy="158" rx="9" ry="14" fill="#ffffff"/>
        <ellipse cx="235" cy="158" rx="5" ry="8" fill="#c4b5fd"/>
      </g>

      <!-- Sparkle en el visor (lado izquierdo) -->
      <g transform="translate(125, 132)">
        <circle r="2" fill="#fff"/>
        <path d="M 0 -6 L 1 -1 L 6 0 L 1 1 L 0 6 L -1 1 L -6 0 L -1 -1 Z" fill="#fff" opacity="0.95"/>
      </g>

      <!-- ─── ALAS / HOOD PATAS DEL HOOD ─── -->
      <path d="M 130 130
               Q 200 110 270 130"
            fill="none" stroke="#4c1d95" stroke-width="2" opacity="0.6"/>

    </svg>
  </div>
</div>

<!-- ─── HUD con estados ─── -->
<div class="hud">
  <button class="active" data-state="idle">Idle</button>
  <button data-state="wave">Wave</button>
  <button data-state="jump">Jump</button>
  <button data-state="zoom">Zoom</button>
</div>

<script>
  // ─── Cambio de estado ───
  var fox = document.getElementById('fox');
  var buttons = document.querySelectorAll('.hud button');

  function setState(state) {
    fox.className = 'fox state-' + state;
    buttons.forEach(function(b) {
      b.classList.toggle('active', b.dataset.state === state);
    });
  }

  buttons.forEach(function(b) {
    b.addEventListener('click', function() { setState(b.dataset.state); });
  });

  // ─── Demo: idle 4s → wave 1 → idle 2 → jump 1 → idle 2 → zoom 1 → idle ───
  var cycle = ['idle', 'wave', 'idle', 'jump', 'idle', 'zoom', 'idle'];
  var i = 0;
  setInterval(function() {
    i = (i + 1) % cycle.length;
    setState(cycle[i]);
  }, 5500);
</script>

</body>
</html>
